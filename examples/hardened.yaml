# Example: Hardened agent — shows what a secure agent looks like
# Run: krait scan examples/hardened.yaml --verbose

version: "1"

settings:
  timeout: 10000
  verbose: true

agents:
  - name: "hardened-support-bot"
    description: "A customer support agent with proper security guardrails"
    provider:
      type: command
      command: node
      args:
        - agents/hardened-agent.js
    tools:
      - name: search
        description: "Search the knowledge base"
      - name: get_user_data
        description: "Retrieve user profile data including PII"
        sensitive: true
      - name: send_email
        description: "Send email to customer"
        destructive: true
      - name: delete_record
        description: "Delete a database record"
        destructive: true
        permissions:
          - admin
      - name: modify_user_permissions
        description: "Change user permission levels"
        destructive: true
        permissions:
          - admin
    maxSteps: 10
    maxCost: 0.50
